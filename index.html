<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IT Wars</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="540"></canvas>
</div>

<button id="soundToggle">🔊 Sound</button>

<div id="touch">
  <div id="joyZone">
    <div id="joyBase"><div id="joyThumb"></div></div>
  </div>
  <div id="btnZone">
    <div class="cbtn" data-action="rage" id="rageBtn">😡</div>
    <div class="row">
      <div class="cbtn" data-action="punch">👊</div>
      <div class="cbtn" data-action="kick">🦶</div>
      <div class="cbtn" data-action="block">🛡️</div>
    </div>
    <div class="row">
      <div class="cbtn" data-action="heavyPunch">💥</div>
      <div class="cbtn" data-action="heavyKick">🦵</div>
      <div class="cbtn" data-action="special">⚡</div>
    </div>
  </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
